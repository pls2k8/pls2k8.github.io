副腎摘出の前後で、体調や行動特性にさまざまな変化を感じました。<br>

</p>

<div class="idea-number">01</div>
<h4 class="idea-title">目を閉じる15分休憩</h4>

<p>
10時と3時に、15分だけ静かな休憩をしてみませんか。<br>
100円ショップなどで手に入るアイパッチを使います。<br>
部屋が明るくても、目を閉じれば暗い環境になります。<br>
横になり、ゆっくり呼吸するだけ。<br>
眠っても眠らなくても大丈夫な休憩です。
</p>
